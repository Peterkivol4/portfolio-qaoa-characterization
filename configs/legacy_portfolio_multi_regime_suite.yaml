title: Legacy Portfolio QAOA compatibility suite
output_dir: results/legacy_portfolio/multi_regime_suite
base:
  n_assets: 8
  budget: 3
  p_layers: 2
  evaluation_budget: 12
  n_init_points: 4
  shots: 256
  cvar_alpha: 0.1
  execution_mode: fast_simulator
  execution_billing_mode: job
  job_queue_latency_seconds: 2.0
  transpile_topology: auto
  calibration_aware_routing: true
  noise_model: depolarizing
  measurement_mitigation: true
  bo_acquisition: ucb
  bo_target: raw
  bo_max_gp_dim: 16
  bo_high_dim_strategy: random_embedding
  periodic_parameter_wrap: true
  bootstrap_resamples: 500
  qpu_pricing_tier: custom
  qpu_price_per_second_usd: 0.0
seeds: [1, 2, 3]
studies:
  - name: regime
    key: regime
    values: [baseline, low_correlation, high_correlation, sparse_covariance, clustered_assets, hard_budget]
  - name: asset_scale
    key: n_assets
    values: [6, 8, 10, 12]
  - name: shot_budget
    key: shots
    values: [128, 512, 2048]
  - name: circuit_depth
    key: p_layers
    values: [1, 2, 3, 4]
  - name: mixer_comparison
    key: mixer_type
    values: [xy, product_x]
  - name: eval_budget
    key: evaluation_budget
    values: [8, 12, 20]
  - name: cvar_alpha
    key: cvar_alpha
    values: [0.05, 0.1, 0.2]
  - name: invalid_penalty
    key: invalid_penalty
    values: [20.0, 50.0, 100.0]
